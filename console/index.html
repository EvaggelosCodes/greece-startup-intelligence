<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIKE · Console</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M8 1l5 7-5 7-5-7z' fill='%235b9dff'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0e; --bg2:#0c1016; --card:#10151d; --card2:#131a23;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
  --ink:#e9edf3; --ink2:#9aa4b1; --mut:#5c6675;
  --accent:#5b9dff; --accent-dim:rgba(91,157,255,.14);
  --up:#36d6a0; --down:#ff6b6b; --gold:#ecc56b; --amber:#f2b24c;
  --grad:linear-gradient(90deg,#5b9dff,#36d6a0);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg); color:var(--ink); font-family:'Space Grotesk',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; line-height:1.5; overflow-x:hidden;
  background-image:radial-gradient(900px 480px at 80% -10%,rgba(91,157,255,.09),transparent 60%),
    radial-gradient(700px 480px at -5% 105%,rgba(54,214,160,.05),transparent 55%); background-attachment:fixed;}
.mono{font-family:'IBM Plex Mono',monospace}
.wrap{max-width:1180px;margin:0 auto;padding:0 26px}
.label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut)}

header{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(8,10,14,.74);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;justify-content:space-between;height:58px}
.brand{display:flex;align-items:center;gap:11px}
.diamond{width:16px;height:16px;background:var(--grad);clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);box-shadow:0 0 16px rgba(91,157,255,.6)}
.brand b{font-size:17px;font-weight:700;letter-spacing:.04em}
.brand span{color:var(--mut);font-size:12px}
.status{display:flex;align-items:center;gap:16px}
.clock{font-size:12px;color:var(--ink2)}
.live{display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--up);animation:pulse 2s infinite}
.live.off .dot{background:var(--down);animation:none}.live.off{color:var(--down)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(54,214,160,.5)}70%{box-shadow:0 0 0 6px rgba(54,214,160,0)}100%{box-shadow:0 0 0 0 rgba(54,214,160,0)}}

/* compact control bar — small buttons */
.ctl{display:flex;align-items:center;gap:14px;margin:22px 0 10px;flex-wrap:wrap}
.run-sm{display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;
  font-family:'Space Grotesk';font-size:13px;font-weight:600;color:#04121f;background:var(--grad);
  padding:9px 16px;border-radius:9px;box-shadow:0 4px 14px rgba(91,157,255,.28);transition:.18s}
.run-sm:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(91,157,255,.42)}
.run-sm:disabled{cursor:default;background:var(--card2);color:var(--ink2);box-shadow:none}
.run-sm .rb{width:8px;height:8px;border-radius:50%;background:#04121f}
.run-sm:disabled .rb{background:var(--up);animation:pulse 1.1s infinite}
.rstat{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink2)}
.rstat b{color:var(--up)}
.ctl .gap{flex:1}
.schtxt{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mut)}
.link-sm{background:none;border:1px solid var(--line2);color:var(--ink2);cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 11px;border-radius:8px}
.link-sm:hover{border-color:var(--accent);color:var(--accent)}
.sched-editor{display:flex;flex-wrap:wrap;gap:12px;align-items:center;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.seg{display:inline-flex;background:var(--bg2);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{background:none;border:none;color:var(--ink2);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 12px;cursor:pointer}
.seg button.on{background:var(--accent-dim);color:var(--accent)}
.fld{display:flex;align-items:center;gap:7px}
.fld input,.fld select{background:var(--bg2);border:1px solid var(--line);color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:7px 9px;border-radius:7px}
.savebtn{background:var(--accent);color:#04121f;border:none;border-radius:8px;padding:8px 15px;font-family:'Space Grotesk';font-weight:600;cursor:pointer}
.provider-editor .secret{width:min(360px,70vw)}
.provider-editor .base{width:min(330px,70vw)}
.provider-editor .check input{width:auto;accent-color:var(--accent)}
.provider-note{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut)}
.provider-note.ok{color:var(--up)}.provider-note.bad{color:var(--down)}

/* LIVE ACTIVITY */
.live-panel{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line2);border-radius:16px;padding:20px 22px;margin:8px 0 4px}
.live-panel.idle{opacity:.92}
.phasebar{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:14px}
.ph{position:relative}
.ph .pt{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.04em;color:var(--mut);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ph .ptrack{height:5px;background:var(--card2);border-radius:4px;overflow:hidden}
.ph .pfill{height:100%;width:0;background:var(--grad);border-radius:4px;transition:width .5s ease}
.ph.done .pfill{width:100%}.ph.done .pt{color:var(--ink2)}
.ph.active .pt{color:var(--accent)}
.ph.active .pfill{width:100%;animation:shimmer 1.4s infinite linear;
  background:linear-gradient(90deg,var(--accent),var(--up),var(--accent));background-size:200% 100%}
@keyframes shimmer{0%{background-position:0 0}100%{background-position:200% 0}}
.actmeta{display:flex;align-items:center;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink2);margin-bottom:12px;flex-wrap:wrap}
.spin{width:12px;height:12px;border:2px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.actmeta .mph{color:var(--accent);font-weight:600}
.actfeed{font-family:'IBM Plex Mono',monospace;font-size:12.5px;max-height:240px;overflow:auto;
  display:flex;flex-direction:column;gap:3px;padding-top:4px;border-top:1px solid var(--line)}
.act{display:flex;gap:10px;padding:3px 0;align-items:baseline;animation:fadein .3s ease}
@keyframes fadein{from{opacity:0;transform:translateX(-6px)}to{opacity:1}}
.act .ic{flex:none;width:16px;text-align:center}
.act .tx{color:var(--ink2);word-break:break-word}
.act.search .tx{color:var(--ink)} .act.search .ic{color:var(--accent)}
.act.think .tx{color:var(--accent);font-style:italic}
.act.kill .tx{color:var(--down)} .act.learn .tx{color:var(--up)}
.act.write .ic{color:var(--ink2)} .act.commit .ic{color:var(--up)}
.empty{color:var(--mut);font-size:13px;font-style:italic;padding:6px 0}

/* stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:14px 0}
.stat{background:var(--bg2);padding:16px 18px}
.stat .n{font-size:27px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.stat.hl .n{color:var(--gold)} .stat .t{margin-top:3px}

section{padding:34px 0}
.shead{display:flex;align-items:baseline;gap:13px;margin-bottom:18px}
.shead h2{font-size:13px;font-family:'IBM Plex Mono',monospace;letter-spacing:.2em;text-transform:uppercase;font-weight:500}
.shead .ct{color:var(--mut);font-size:12px;font-family:'IBM Plex Mono',monospace}
.shead .rule{flex:1;height:1px;background:var(--line)}

/* BIG idea cards */
.idea{position:relative;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px 34px;margin-bottom:18px;overflow:hidden;transition:.3s}
.idea:hover{border-color:var(--line2);transform:translateY(-2px)}
.idea::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--mut);opacity:.5;transition:.3s}
.idea.priority::before{background:var(--grad);opacity:1}.idea.good::before{background:var(--amber)}
.itop{display:flex;justify-content:space-between;align-items:flex-start;gap:22px}
.iname{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.rank{font-family:'IBM Plex Mono',monospace;color:var(--mut);font-size:15px}
.iname h3{font-size:27px;font-weight:600;letter-spacing:-.01em}
.badge{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;padding:4px 11px;border-radius:20px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(91,157,255,.3)}
.badge.act{background:rgba(54,214,160,.14);color:var(--up);border-color:rgba(54,214,160,.35)}
.score{display:flex;align-items:baseline;gap:8px;flex:none}
.score b{font-size:50px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1}
.score .of{color:var(--mut);font-size:14px;font-family:'IBM Plex Mono',monospace}
.tr{font-size:19px;flex:none}.tr.up{color:var(--up)}.tr.down{color:var(--down)}.tr.flat{color:var(--mut)}
.iwhat{color:var(--ink);font-size:17px;margin:16px 0 18px;max-width:70ch;line-height:1.55}
.meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.chip{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink2);background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:7px 12px}
.chip b{color:var(--up)}
.bars{display:grid;grid-template-columns:repeat(7,1fr);gap:11px;margin-bottom:6px}
.bar .bl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track{height:7px;background:var(--card2);border-radius:5px;overflow:hidden}
.fill{height:100%;width:0;border-radius:5px;background:var(--grad);transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
.why{margin-top:18px;font-size:14px;color:var(--ink2);line-height:1.6}
.why .k{color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.risk .k{color:var(--down)}

/* learned */
.learn-c{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--up);border-radius:12px;padding:18px 22px;margin-bottom:12px}
.learn-c .lt{display:flex;gap:12px;align-items:baseline;margin-bottom:8px}
.learn-c .ld{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--up)}
.learn-c .lh{font-weight:600;font-size:15px}
.learn-c .lb{font-size:14px;color:var(--ink2);line-height:1.55}
.learn-c .lb b{color:var(--ink);font-weight:500}

/* graveyard */
.tomb{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-bottom:10px;opacity:.85}
.tomb .tn{font-weight:500;text-decoration:line-through;text-decoration-color:var(--down);color:var(--ink2)}
.tomb .tr2{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mut)}
.killtag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;padding:4px 9px;border-radius:6px;background:rgba(255,107,107,.1);color:var(--down);border:1px solid rgba(255,107,107,.25)}

.feed{font-family:'IBM Plex Mono',monospace;font-size:13px}
.fline{display:flex;gap:16px;padding:11px 0;border-top:1px solid var(--line);color:var(--ink2)}
.fline:first-child{border-top:none}.fline .fd{color:var(--accent);flex:none}

footer{border-top:1px solid var(--line);padding:24px 0 46px;margin-top:26px}
.foot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;color:var(--mut);font-size:12px;font-family:'IBM Plex Mono',monospace}

#toast{position:fixed;right:22px;bottom:22px;z-index:99;display:flex;flex-direction:column;gap:8px}
.tt{background:var(--card2);border:1px solid var(--line2);border-left:3px solid var(--accent);border-radius:8px;padding:10px 15px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink);box-shadow:0 12px 40px rgba(0,0,0,.5);animation:ttin .3s ease,ttout .4s ease 3.4s forwards}
@keyframes ttin{from{opacity:0;transform:translateX(22px)}to{opacity:1}}@keyframes ttout{to{opacity:0;transform:translateX(22px)}}
.rv{opacity:0;transform:translateY(12px);animation:rv .55s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes rv{to{opacity:1;transform:none}}
.flash{animation:flash 1s ease}@keyframes flash{0%{box-shadow:0 0 0 1px var(--accent),0 0 28px rgba(91,157,255,.3)}100%{box-shadow:none}}

@media(max-width:860px){.stats{grid-template-columns:repeat(3,1fr)}.bars{grid-template-columns:repeat(4,1fr)}.phasebar{grid-template-columns:repeat(3,1fr)}.idea{padding:24px}.score b{font-size:40px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header><div class="wrap bar">
  <div class="brand"><div class="diamond"></div><b>MIKE</b><span>· Greece Startup Intelligence</span></div>
  <div class="status"><div class="clock mono" id="clock">--:--:--</div>
    <div class="live" id="live"><span class="dot"></span><span id="livet">LIVE</span></div></div>
</div></header>

<main class="wrap">
  <div class="ctl">
    <button class="run-sm" id="runbtn"><span class="rb"></span><span id="rbtxt">Run</span></button>
    <div class="rstat" id="rstat">idle</div>
    <div class="gap"></div>
    <div class="schtxt" id="modelsum">model</div>
    <button class="link-sm" id="editprovider">model ▾</button>
    <div class="schtxt" id="schedsum">no schedule</div>
    <button class="link-sm" id="editsched">schedule ▾</button>
  </div>
  <div class="sched-editor" id="schededitor" hidden>
    <div class="seg" id="modeseg">
      <button data-m="off">Off</button><button data-m="daily">Daily</button>
      <button data-m="weekly">Weekly</button><button data-m="interval">Interval</button>
    </div>
    <div class="fld" id="fld-time"><span class="label">at</span><input type="time" id="in-time" value="09:00"></div>
    <div class="fld" id="fld-day"><span class="label">on</span>
      <select id="in-day"><option value="1">Mon</option><option value="2">Tue</option><option value="3">Wed</option><option value="4">Thu</option><option value="5">Fri</option><option value="6">Sat</option><option value="0">Sun</option></select></div>
    <div class="fld" id="fld-int"><span class="label">every</span><input type="number" id="in-int" min="1" value="24" style="width:58px"><span class="label">hrs</span></div>
    <button class="savebtn" id="savesched">Save</button>
  </div>
  <div class="sched-editor provider-editor" id="providereditor" hidden>
    <label class="fld check"><input type="checkbox" id="in-provider-enabled" checked><span class="label">use router</span></label>
    <div class="fld"><span class="label">provider</span>
      <select id="in-provider-type"><option value="openrouter">OpenRouter</option><option value="zai">Z.AI GLM</option></select></div>
    <div class="fld"><span class="label">model</span>
      <select id="in-model"><option value="~anthropic/claude-sonnet-latest">~anthropic/claude-sonnet-latest</option><option value="anthropic/claude-haiku-4.5">anthropic/claude-haiku-4.5</option><option value="anthropic/claude-sonnet-4.6">anthropic/claude-sonnet-4.6</option><option value="openrouter/free">openrouter/free</option><option value="qwen/qwen3-coder:free">qwen/qwen3-coder:free</option><option value="openai/gpt-oss-120b:free">openai/gpt-oss-120b:free</option><option value="glm-5.2[1m]">glm-5.2[1m]</option><option value="glm-5.2">glm-5.2</option><option value="glm-4.7">glm-4.7</option></select></div>
    <div class="fld"><span class="label">small</span>
      <select id="in-small"><option value="anthropic/claude-haiku-4.5">anthropic/claude-haiku-4.5</option><option value="~anthropic/claude-sonnet-latest">~anthropic/claude-sonnet-latest</option><option value="anthropic/claude-sonnet-4.6">anthropic/claude-sonnet-4.6</option><option value="openrouter/free">openrouter/free</option><option value="qwen/qwen3-coder:free">qwen/qwen3-coder:free</option><option value="openai/gpt-oss-120b:free">openai/gpt-oss-120b:free</option><option value="glm-4.7">glm-4.7</option><option value="glm-5.2">glm-5.2</option><option value="glm-5.2[1m]">glm-5.2[1m]</option></select></div>
    <div class="fld"><span class="label">url</span><input class="base" id="in-base" value="https://openrouter.ai/api"></div>
    <div class="fld"><span class="label">key</span><input class="secret" type="password" id="in-key" autocomplete="off" placeholder="OpenRouter API key"></div>
    <button class="savebtn" id="saveprovider">Save</button>
    <button class="link-sm" id="testprovider">test</button>
    <button class="link-sm" id="clearprovider">clear key</button>
    <span class="provider-note" id="providernote"></span>
  </div>

  <div class="live-panel idle" id="livepanel">
    <div class="phasebar" id="phasebar"></div>
    <div class="actmeta" id="actmeta"></div>
    <div class="actfeed" id="actfeed"></div>
  </div>

  <div class="stats" id="stats"></div>

  <section>
    <div class="shead"><h2>The Pool</h2><span class="ct" id="poolct"></span><div class="rule"></div></div>
    <div id="ideas"></div>
  </section>

  <section>
    <div class="shead"><h2>What Mike Learned</h2><span class="ct" id="learnct"></span><div class="rule"></div></div>
    <div id="learned"></div>
  </section>

  <section>
    <div class="shead"><h2>The Graveyard</h2><span class="ct" id="killct"></span><div class="rule"></div></div>
    <div id="killed"></div>
  </section>

  <section>
    <div class="shead"><h2>Run Log</h2><span class="ct" id="runct"></span><div class="rule"></div></div>
    <div class="feed" id="runs"></div>
  </section>
</main>

<footer><div class="wrap foot">
  <span>◆ MIKE CONSOLE · live · console = 0 credits (a run spends credits)</span>
  <span id="updated">—</span>
</div></footer>
<div id="toast"></div>

<script>
const $=s=>document.querySelector(s), el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
const tierColor=v=>v>=8?'var(--gold)':v>=6.5?'var(--amber)':'var(--down)';
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let firstLoad=true, ticker=null, runStart=0, curPhase=0, PHASES=[], providerNeedsKey=false;

function fmtDur(ms){const s=Math.round(ms/1000);return s<60?s+'s':Math.floor(s/60)+'m'+String(s%60).padStart(2,'0')+'s';}
function countUp(node,to){const dur=650,t0=performance.now(),dec=(to%1!==0);
  (function step(t){const p=Math.min(1,(t-t0)/dur);node.textContent=dec?(to*(1-Math.pow(1-p,3))).toFixed(2):Math.round(to*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(step);})(t0);}

const ICON={search:'🔍',write:'✍',read:'›',bash:'⚙',scan:'🔎',think:'💭',commit:'⬆',kill:'✖',learn:'🧠',log:'⚠',tool:'•'};
function actClass(kind,text){
  if(kind==='write'&&/KILLED/i.test(text))return['kill','✖'];
  if(kind==='write'&&/CORRECTIONS|JOURNAL|PLAYBOOK/i.test(text))return['learn','🧠'];
  if(kind==='bash'&&/git/.test(text))return['commit','⬆'];
  return[kind,ICON[kind]||'•'];
}
function addAct(kind,text){
  const[cls,ic]=actClass(kind,text);
  const feed=$('#actfeed'); if($('#actfeed .empty'))feed.innerHTML='';
  const row=el('div','act '+cls); row.innerHTML='<span class="ic">'+ic+'</span><span class="tx">'+esc(text)+'</span>';
  feed.appendChild(row); feed.scrollTop=feed.scrollHeight;
  while(feed.children.length>120)feed.removeChild(feed.firstChild);
}
function renderPhases(run){
  PHASES=run.phases||[]; const pi=run.phaseIndex, running=run.running;
  const pb=$('#phasebar'); pb.innerHTML='';
  PHASES.forEach((p,i)=>{const cls=running?(i<pi?'done':(i===pi?'active':'')):(run.lastRun&&!run.running&&i<PHASES.length?'done':'');
    const d=el('div','ph '+cls); d.innerHTML='<div class="pt">'+esc(p)+'</div><div class="ptrack"><div class="pfill"></div></div>'; pb.appendChild(d);});
}
function renderMeta(run){
  const m=$('#actmeta');
  if(run.running){ runStart=run.startedAt; curPhase=run.phaseIndex;
    m.innerHTML='<span class="spin"></span><span class="mph">'+esc(run.phase||'working')+'</span><span>· step '+(run.turns||0)+'</span><span id="elapsed">· '+fmtDur(Date.now()-run.startedAt)+'</span>'+(run.cost?'<span>· $'+run.cost.toFixed(3)+'</span>':'');
    if(!ticker)ticker=setInterval(()=>{const e=$('#elapsed');if(e&&runStart)e.textContent='· '+fmtDur(Date.now()-runStart);},1000);
  } else {
    if(ticker){clearInterval(ticker);ticker=null;}
    if(run.lastRun){const ok=run.lastExit===0;
      m.innerHTML='<span style="color:'+(ok?'var(--up)':'var(--down)')+'">'+(ok?'✔ last run complete':'⚠ last run exit '+run.lastExit)+'</span><span>· '+fmtDur(run.lastDurationMs)+'</span><span>· '+(run.turns||0)+' steps</span>'+(run.cost?'<span>· $'+run.cost.toFixed(3)+'</span>':'')+(run.lastError?'<span>· '+esc(run.lastError)+'</span>':'');
    } else if(run.lastError) {
      m.innerHTML='<span style="color:var(--down)">⚠ '+esc(run.lastError)+'</span>';
    } else m.innerHTML='<span style="color:var(--mut)">Mike is idle — hit Run to start a research session.</span>';
  }
}
function renderActivity(run){
  $('#livepanel').classList.toggle('idle',!run.running);
  renderPhases(run); renderMeta(run);
  const feed=$('#actfeed');
  if(document.activeElement!==feed){
    feed.innerHTML='';
    if(run.activity&&run.activity.length) run.activity.forEach(a=>{const[cls,ic]=actClass(a.kind,a.text);
      const row=el('div','act '+cls); row.innerHTML='<span class="ic">'+ic+'</span><span class="tx">'+esc(a.text)+'</span>'; feed.appendChild(row);});
    else feed.appendChild(el('div','empty','No activity yet — Mike’s last session will stream here.'));
    feed.scrollTop=feed.scrollHeight;
  }
}

function render(s){
  renderActivity(s.run||{});
  // stats
  const st=$('#stats'); st.innerHTML='';
  [['Pool',s.stats.pool,0],['Top score',s.stats.top,1],['Killed',s.stats.killed,0],['Learnings',s.stats.learnings,0],['Runs',s.stats.runs,0]]
    .forEach(([t,v,hl])=>{const c=el('div','stat'+(hl?' hl':''));const n=el('div','n','0');c.appendChild(n);c.appendChild(el('div','t label',t));st.appendChild(c);countUp(n,v);});
  // ideas
  const wrap=$('#ideas'); wrap.innerHTML=''; $('#poolct').textContent=s.ideas.length+' active';
  if(!s.ideas.length)wrap.appendChild(el('div','empty','No ideas yet.'));
  s.ideas.forEach((it,i)=>{
    const card=el('div','idea '+it.tier+' rv'); card.style.animationDelay=(i*80)+'ms';
    const badge=it.actionable?'<span class="badge act">🎯 Actionable</span>':it.tier==='priority'?'<span class="badge">Priority</span>':'';
    const arr=it.trend==='up'?'↗':it.trend==='down'?'↘':'→';
    const bars=it.breakdown.map(b=>`<div class="bar"><div class="bl">${b.k.replace(/_/g,' ')}</div><div class="track"><div class="fill" data-w="${b.v*10}"></div></div></div>`).join('');
    card.innerHTML=`<div class="itop"><div class="iname"><span class="rank">#${i+1}</span><h3>${esc(it.name)}</h3>${badge}</div>
      <div style="display:flex;align-items:center;gap:14px"><span class="tr ${it.trend}">${arr}</span>
      <div class="score"><b style="color:${tierColor(it.score)}">${it.score!=null?it.score.toFixed(1):'—'}</b><span class="of">/10</span></div></div></div>
      ${it.what?`<div class="iwhat">${esc(it.what)}</div>`:''}
      <div class="meta">${it.revenue?`<span class="chip">Month 1 · <b>${esc(it.revenue.replace(/ with.*/,''))}</b></span>`:''}</div>
      ${it.breakdown.length?`<div class="bars">${bars}</div>`:''}
      ${it.whyNow?`<div class="why"><span class="k">Why now</span>&nbsp; ${esc(it.whyNow)}</div>`:''}
      ${it.risk?`<div class="why risk"><span class="k">Risk</span>&nbsp; ${esc(it.risk)}</div>`:''}`;
    wrap.appendChild(card);
  });
  requestAnimationFrame(()=>document.querySelectorAll('.fill').forEach(f=>f.style.width=f.dataset.w+'%'));
  // learned
  const lw=$('#learned'); lw.innerHTML=''; $('#learnct').textContent=(s.learned||[]).length+' corrections';
  if(!(s.learned||[]).length)lw.appendChild(el('div','empty','Nothing unlearned yet.'));
  (s.learned||[]).forEach((l,i)=>{const c=el('div','learn-c rv');c.style.animationDelay=(i*60)+'ms';
    c.innerHTML=`<div class="lt"><span class="ld">${esc(l.date)}</span><span class="lh">${esc(l.title)}</span></div>
      <div class="lb">${l.truth?'<b>Truth:</b> '+esc(l.truth)+' ':''}${l.change?'<br><b>So now:</b> '+esc(l.change):''}</div>`; lw.appendChild(c);});
  // graveyard
  const kw=$('#killed'); kw.innerHTML=''; $('#killct').textContent=s.killed.length+' buried';
  if(!s.killed.length)kw.appendChild(el('div','empty','No kills yet — Mike hasn’t had to bury anything.'));
  s.killed.forEach((k,i)=>{const t=el('div','tomb rv');t.style.animationDelay=(i*50)+'ms';
    t.innerHTML=`<span class="tn">${esc(k.idea)}</span><span class="tr2">${esc(k.reason||'')}</span><span class="killtag">${esc(k.type||k.score||'')}</span>`;kw.appendChild(t);});
  // runs
  const rw=$('#runs'); rw.innerHTML=''; $('#runct').textContent=s.runs.length+' logged';
  if(!s.runs.length)rw.appendChild(el('div','empty','No runs logged yet.'));
  s.runs.forEach(r=>{const m=r.match(/^(\d{4}-\d{2}-\d{2})\s*\|?\s*(.*)$/);const line=el('div','fline');
    line.innerHTML=`<span class="fd">${m?m[1]:'•'}</span><span>${esc(m?m[2]:r)}</span>`;rw.appendChild(line);});
  renderControl(s);
  $('#updated').textContent='updated '+new Date(s.generatedAt).toLocaleTimeString();
  firstLoad=false;
}

/* ---- control + schedule ---- */
function relTime(ts){const d=ts-Date.now();if(d<=0)return 'due now';const m=Math.round(d/60000);
  if(m<60)return 'in '+m+'m';const h=Math.floor(m/60);if(h<24)return 'in '+h+'h '+(m%60)+'m';
  return new Date(ts).toLocaleString([],{weekday:'short',hour:'2-digit',minute:'2-digit'});}
let schedEditing=false, editMode='daily';
function applyVis(){$('#fld-time').style.display=(editMode==='daily'||editMode==='weekly')?'flex':'none';
  $('#fld-day').style.display=editMode==='weekly'?'flex':'none';$('#fld-int').style.display=editMode==='interval'?'flex':'none';}
function setEditor(sc){editMode=sc.enabled?sc.mode:'off';
  document.querySelectorAll('#modeseg button').forEach(b=>b.classList.toggle('on',b.dataset.m===editMode));
  if(sc.time)$('#in-time').value=sc.time; if(sc.day!=null)$('#in-day').value=String(sc.day);
  if(sc.intervalMin)$('#in-int').value=String(sc.intervalMin/60); applyVis();}
let providerEditing=false;
const PROVIDER_PRESETS={
  openrouter:{name:'OpenRouter',baseUrl:'https://openrouter.ai/api',model:'openrouter/free',smallModel:'openrouter/free',keyLabel:'OpenRouter API key'},
  zai:{name:'Z.AI GLM',baseUrl:'https://api.z.ai/api/anthropic',model:'glm-5.2[1m]',smallModel:'glm-4.7',keyLabel:'Z.AI API key'}
};
function setSelectValue(sel,value){
  const x=$(sel); if(!x)return;
  if(value && ![...x.options].some(o=>o.value===value)) x.appendChild(new Option(value,value));
  if(value)x.value=value;
}
function applyProviderPreset(type,force){
  const p=PROVIDER_PRESETS[type]||PROVIDER_PRESETS.openrouter;
  if(force||!$('#in-base').value)$('#in-base').value=p.baseUrl;
  if(force)setSelectValue('#in-model',p.model);
  if(force)setSelectValue('#in-small',p.smallModel);
  $('#in-key').placeholder=p.keyLabel;
}
function setProviderEditor(p){
  p=p||{};
  const type=p.type||'openrouter';
  $('#in-provider-enabled').checked=p.enabled!==false;
  setSelectValue('#in-provider-type',type);
  $('#in-base').value=p.baseUrl||(PROVIDER_PRESETS[type]||PROVIDER_PRESETS.openrouter).baseUrl;
  setSelectValue('#in-model',p.model||(PROVIDER_PRESETS[type]||PROVIDER_PRESETS.openrouter).model);
  setSelectValue('#in-small',p.smallModel||(PROVIDER_PRESETS[type]||PROVIDER_PRESETS.openrouter).smallModel);
  const key=$('#in-key'); key.value=''; key.placeholder=p.configured?(p.keyPreview+' saved'):(PROVIDER_PRESETS[type]||PROVIDER_PRESETS.openrouter).keyLabel;
  const note=$('#providernote'); note.className='provider-note '+(p.ready?'ok':'bad');
  note.textContent=p.enabled===false?'router off; using default Claude auth.':(p.configured?('key saved from '+(p.keySource||'provider.json')):(p.message||'key missing'));
}
function renderProvider(p){
  p=p||{}; providerNeedsKey=!!(p.enabled&& !p.ready);
  const sum=$('#modelsum');
  sum.textContent=p.enabled===false?'model default Claude':(p.ready?('model '+(p.model||'router')+' via '+(p.name||'provider')):'model key missing');
  sum.style.color=p.enabled===false?'var(--mut)':(p.ready?'var(--up)':'var(--down)');
  if(!providerEditing)setProviderEditor(p);
}
function renderControl(s){
  const r=s.run||{}, sc=s.schedule||{};
  renderProvider(s.provider||{});
  $('#runbtn').disabled=r.running; $('#rbtxt').textContent=r.running?'Running':(providerNeedsKey?'Add key':'Run');
  $('#rstat').innerHTML=r.running?('<b>'+esc(r.phase||'working')+'</b>'):(r.lastRun?('last run '+new Date(r.lastRun).toLocaleTimeString()):'idle');
  $('#schedsum').textContent=sc.enabled?('▶ '+(sc.mode==='interval'?('every '+(sc.intervalMin/60)+'h'):(sc.mode+' '+sc.time+(sc.mode==='weekly'?' '+DOW[sc.day]:'')))+(s.nextRun?' · '+relTime(s.nextRun):'')):'no schedule';
  if(!schedEditing)setEditor(sc);
}
function openProviderEditor(){const ed=$('#providereditor');ed.hidden=false;providerEditing=true;$('#in-key').focus();}
$('#runbtn').addEventListener('click',async()=>{if($('#runbtn').disabled)return;if(providerNeedsKey){openProviderEditor();toast('Save an API key first');return;}$('#rbtxt').textContent='Starting…';try{await fetch('/api/run',{method:'POST'});}catch{}});
$('#editsched').addEventListener('click',()=>{const ed=$('#schededitor');ed.hidden=!ed.hidden;schedEditing=!ed.hidden;});
$('#editprovider').addEventListener('click',()=>{const ed=$('#providereditor');ed.hidden=!ed.hidden;providerEditing=!ed.hidden;if(providerEditing)$('#in-key').focus();});
$('#in-provider-type').addEventListener('change',e=>applyProviderPreset(e.target.value,true));
document.querySelectorAll('#modeseg button').forEach(b=>b.addEventListener('click',()=>{editMode=b.dataset.m;document.querySelectorAll('#modeseg button').forEach(x=>x.classList.toggle('on',x===b));applyVis();}));
$('#savesched').addEventListener('click',async()=>{let p;
  if(editMode==='off')p={enabled:false};
  else if(editMode==='interval')p={enabled:true,mode:'interval',intervalMin:Math.max(1,+$('#in-int').value)*60};
  else p={enabled:true,mode:editMode,time:$('#in-time').value,day:+$('#in-day').value};
  try{await fetch('/api/schedule',{method:'POST',body:JSON.stringify(p)});}catch{}
  schedEditing=false;$('#schededitor').hidden=true;load(false);});
async function saveProvider(close,clearKey){
  const type=$('#in-provider-type').value;
  const body={enabled:$('#in-provider-enabled').checked,type,baseUrl:$('#in-base').value.trim(),model:$('#in-model').value,smallModel:$('#in-small').value,timeoutMs:1500000};
  const key=$('#in-key').value.trim(); if(key)body.apiKey=key; if(clearKey)body.clearKey=true;
  const r=await fetch('/api/provider',{method:'POST',body:JSON.stringify(body)});
  const data=await r.json(); setProviderEditor(data.provider||{}); providerNeedsKey=!!(data.provider&&data.provider.enabled&&!data.provider.ready);
  if(close){providerEditing=false;$('#providereditor').hidden=true;}
  load(false); return data.provider;
}
$('#saveprovider').addEventListener('click',async()=>{try{await saveProvider(true,false);toast('model saved');}catch{toast('model save failed');}});
$('#clearprovider').addEventListener('click',async()=>{try{await saveProvider(false,true);toast('key cleared');}catch{toast('clear failed');}});
$('#testprovider').addEventListener('click',async()=>{const note=$('#providernote');note.className='provider-note';note.textContent='testing...';try{await saveProvider(false,false);const r=await fetch('/api/provider/test',{method:'POST'});const d=await r.json();note.className='provider-note '+(d.ok?'ok':'bad');note.textContent=d.ok?'GLM connection OK':(d.error||'test failed');toast(d.ok?'GLM connection OK':'GLM test failed');}catch(e){note.className='provider-note bad';note.textContent='test failed';}});

/* ---- toast, clock, load, live ---- */
function toast(t){const w=$('#toast');const e=el('div','tt',esc(t));w.appendChild(e);setTimeout(()=>e.remove(),3900);}
async function load(flash){try{const s=await(await fetch('/api/state')).json();render(s);
  if(flash){$('#stats').classList.remove('flash');void $('#stats').offsetWidth;$('#stats').classList.add('flash');}}catch(e){}}
setInterval(()=>$('#clock').textContent=new Date().toLocaleTimeString(),1000);$('#clock').textContent=new Date().toLocaleTimeString();
function connect(){const es=new EventSource('/api/stream');
  es.onopen=()=>{$('#live').classList.remove('off');$('#livet').textContent='LIVE';};
  es.onerror=()=>{$('#live').classList.add('off');$('#livet').textContent='RECONNECTING';};
  es.onmessage=e=>{let d;try{d=JSON.parse(e.data);}catch{return;}
    if(d.type==='change'){load(true);}
    else if(d.type==='run'){
      if(d.state==='started'){toast('▶ Mike started');$('#actfeed').innerHTML='';load(false);}
      else if(d.state==='activity'){addAct(d.kind,d.text);
        const mph=$('#actmeta .mph');if(mph&&d.phase)mph.textContent=d.phase;}
      else if(d.state==='finished'){toast('✔ run finished'+(d.turns?' · '+d.turns+' steps':''));load(true);}
      else if(d.state==='error'){toast('⚠ run error');load(false);}
    }};
}
load(false);connect();
</script>
</body>
</html>
