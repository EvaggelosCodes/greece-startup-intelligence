name: Mike background run

on:
  schedule:
    # Every 12 hours. GitHub cron is UTC.
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "OpenRouter model id"
        required: false
        default: "openai/gpt-oss-120b:free"
      small_model:
        description: "OpenRouter small/fast model id"
        required: false
        default: "openai/gpt-oss-120b:free"

concurrency:
  group: mike-background-run
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  run-mike:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    env:
      ANTHROPIC_BASE_URL: https://openrouter.ai/api
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_MODEL: ${{ github.event.inputs.model || 'openai/gpt-oss-120b:free' }}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ github.event.inputs.model || 'openai/gpt-oss-120b:free' }}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ github.event.inputs.model || 'openai/gpt-oss-120b:free' }}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ github.event.inputs.small_model || 'openai/gpt-oss-120b:free' }}
      ANTHROPIC_SMALL_FAST_MODEL: ${{ github.event.inputs.small_model || 'openai/gpt-oss-120b:free' }}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      API_TIMEOUT_MS: "3000000"

    steps:
      - name: Check secret
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "Missing OPENROUTER_API_KEY repo secret."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "EvaggelosCodes@users.noreply.github.com"
          git config user.name "Greece Intelligence Bot"

      - name: Verify OpenRouter secret
        run: |
          status="$(curl -sS -o /tmp/openrouter-models.json -w "%{http_code}" \
            https://openrouter.ai/api/v1/models \
            -H "Authorization: Bearer $OPENROUTER_API_KEY")"
          if [ "$status" != "200" ]; then
            echo "OpenRouter key check failed with HTTP $status."
            head -c 500 /tmp/openrouter-models.json || true
            exit 1
          fi

      - name: Run Mike with Claude Code Action
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            You are Startup Mike. Execute your COMPLETE daily run sequence exactly as defined in CLAUDE.md, STEP 0 through STEP 10.
            Read your journal, feedback, founder, seasons and brain files first; set your own agenda.
            Run a Greek-first search-only scan. Keep it lean because this may be a slow/free OpenRouter model:
            3-5 targeted searches, no full-page fetches unless absolutely necessary.
            Score candidates and existing ideas on the 7 dimensions. Kill weak ideas, update the brain files, attack your #1 idea, update your journal and search playbook, write the daily log, then commit and push.
            Be rigorous and honest. If the model/provider is slow, prefer a smaller but complete run over hanging forever.
          claude_args: |
            --model ${{ env.ANTHROPIC_MODEL }}
            --max-turns 60
            --dangerously-skip-permissions
        env:
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ env.ANTHROPIC_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ env.ANTHROPIC_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ env.ANTHROPIC_SMALL_FAST_MODEL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ env.ANTHROPIC_SMALL_FAST_MODEL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000"

      - name: Record provider failure
        if: always() && steps.claude.outcome != 'success'
        run: |
          mkdir -p daily-logs
          file="daily-logs/$(date -u +%F)-background-provider-failure.md"
          cat > "$file" <<EOF
          # Background Mike provider failure - $(date -u +%F)

          The 12-hour GitHub Actions wakeup ran, the OpenRouter secret smoke test passed, but Claude Code Action did not complete successfully.

          - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Model: $ANTHROPIC_MODEL
          - Small model: $ANTHROPIC_SMALL_FAST_MODEL
          - Outcome: ${{ steps.claude.outcome }}

          This log exists so a failed provider/model/auth attempt is visible in the repo instead of looking like the automation never ran.
          EOF

      - name: Record no-output run
        if: always()
        run: |
          if git diff --quiet -- brain/ ideas/ daily-logs/; then
            mkdir -p daily-logs
            file="daily-logs/$(date -u +%F)-background-no-output.md"
            cat > "$file" <<EOF
          # Background Mike no-output run - $(date -u +%F)

          The 12-hour GitHub Actions wakeup ran and the OpenRouter secret smoke test passed, but no research files changed.

          - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Model: $ANTHROPIC_MODEL
          - Small model: $ANTHROPIC_SMALL_FAST_MODEL
          - Claude action outcome: ${{ steps.claude.outcome }}

          This log is a proof-of-wakeup marker so the automation never fails silently.
          EOF
          fi

      - name: Fallback commit changed research files
        if: always()
        run: |
          git add brain/ ideas/ daily-logs/
          if git diff --cached --quiet; then
            echo "No research file changes to commit."
          else
            git commit -m "Run $(date -u +%F): background Mike update"
            git push origin main
          fi
